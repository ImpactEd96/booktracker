<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — BookTracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">📚 BookTracker</div>
      <div class="auth-tagline">Track your library and loans in one place.</div>

      <div id="alert" class="alert alert-error" style="display:none"></div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Your name</label>
          <input class="form-input" type="text" id="name" name="name"
                 autocomplete="name" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email"
                 autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 autocomplete="new-password" placeholder="At least 8 characters" required>
          <div class="form-hint">Minimum 8 characters</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-input" type="password" id="confirm" name="confirm"
                 autocomplete="new-password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary auth-submit" type="submit" id="submit-btn">
          Create account
        </button>
      </form>

      <div class="auth-divider">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('signup-form');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submit-btn');

    function showError(msg) {
      alertEl.textContent = msg;
      alertEl.style.display = 'flex';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!name || !email || !password || !confirm) {
        return showError('All fields are required');
      }
      if (password !== confirm) {
        return showError('Passwords do not match');
      }
      if (password.length < 8) {
        return showError('Password must be at least 8 characters');
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account…';

      try {
        const res = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Sign up failed');
          btn.disabled = false;
          btn.textContent = 'Create account';
          return;
        }
        window.location.href = '/app';
      } catch {
        showError('Network error — please try again');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
